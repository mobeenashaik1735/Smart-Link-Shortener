<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Link Shortener</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 20px; }
        input {
            width: 85%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #007bff; }
        button {
            width: 90%;
            margin-top: 15px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #e9f5ff;
            border-radius: 6px;
            display: none;
            word-break: break-all;
        }
        .result a { color: #007bff; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Smart Link Shortener</h1>
        <input type="url" id="longUrl" placeholder="Paste your long URL here..." required>
        <button onclick="shortenLink()">Shorten URL</button>

        <div class="result" id="resultBox">
            <p>Your Shortened Link:</p>
            <a href="#" id="shortLink" target="_blank"></a>
        </div>
    </div>

    <script>
        async function shortenLink() {
            const longUrl = document.getElementById('longUrl').value;
            const resultBox = document.getElementById('resultBox');
            const shortLink = document.getElementById('shortLink');

            if (!longUrl) {
                alert("Please paste a URL first!");
                return;
            }

            try {
                // Sending the long link to our backend server running on Port 5000
                const response = await fetch('http://localhost:5000/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl })
                });

                const data = await response.json();
                
                if (data.shortUrl) {
                    shortLink.href = data.shortUrl;
                    shortLink.innerText = data.shortUrl;
                    resultBox.style.display = 'block';
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("Could not connect to the backend server. Make sure server.js is running!");
            }
        }
    </script>
</body>
</html>
